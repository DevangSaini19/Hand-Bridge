<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient1)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hand Symbol (Left) -->
  <g transform="translate(120, 180)">
    <!-- Palm -->
    <ellipse cx="35" cy="60" rx="28" ry="38" fill="white" opacity="0.95"/>
    <!-- Thumb -->
    <rect x="10" y="55" width="15" height="35" rx="7" fill="white" opacity="0.95" transform="rotate(-25 17 72)"/>
    <!-- Index Finger -->
    <rect x="28" y="20" width="14" height="45" rx="7" fill="white" opacity="0.95"/>
    <!-- Middle Finger -->
    <rect x="45" y="15" width="14" height="50" rx="7" fill="white" opacity="0.95"/>
    <!-- Ring Finger -->
    <rect x="62" y="20" width="14" height="45" rx="7" fill="white" opacity="0.95"/>
    <!-- Pinky -->
    <rect x="78" y="30" width="12" height="38" rx="6" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Hand Symbol (Right - Mirrored) -->
  <g transform="translate(300, 180)">
    <!-- Palm -->
    <ellipse cx="65" cy="60" rx="28" ry="38" fill="white" opacity="0.95"/>
    <!-- Thumb -->
    <rect x="75" y="55" width="15" height="35" rx="7" fill="white" opacity="0.95" transform="rotate(25 82 72)"/>
    <!-- Index Finger -->
    <rect x="58" y="20" width="14" height="45" rx="7" fill="white" opacity="0.95"/>
    <!-- Middle Finger -->
    <rect x="41" y="15" width="14" height="50" rx="7" fill="white" opacity="0.95"/>
    <!-- Ring Finger -->
    <rect x="24" y="20" width="14" height="45" rx="7" fill="white" opacity="0.95"/>
    <!-- Pinky -->
    <rect x="10" y="30" width="12" height="38" rx="6" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Bridge Connection (Curved Line) -->
  <path d="M 190 250 Q 256 200 322 250" stroke="url(#gradient2)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Sound Waves (Right side) -->
  <g opacity="0.7">
    <path d="M 380 230 Q 400 230 400 250 Q 400 270 380 270" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 390 220 Q 420 220 420 250 Q 420 280 390 280" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 400 210 Q 440 210 440 250 Q 440 290 400 290" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text "SB" Monogram at bottom -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">
    SB
  </text>
</svg>
